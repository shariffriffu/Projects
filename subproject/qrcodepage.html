<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Example</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background-color: #f5f5f5;
    }

    .container {
      max-width: 400px;
      margin: 0 auto;
      background-color: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      border: 2px solid #007BFF; /* Add an outline color */
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
      font-size: 24px;
      font-weight: bold;
      color: #007BFF;
    }

    form {
      display: flex;
      flex-direction: column;
    }

    label {
      margin-bottom: 5px;
    }

    input {
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    input:focus {
      outline: none;
      border-color: #007BFF;
    }

    button {
      padding: 10px;
      background-color: #007BFF;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
      margin-bottom: 10px;
    }

    button:hover {
      background-color: #0056b3;
    }

    .submit-btn {
      margin-top: 20px;
    }

    /* Custom Popup Styles */
    .popup-container {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.5);
    }

    .popup {
      background: #fff;
      padding: 20px;
      border-radius: 5px;
      text-align: center;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
    }

    .popup p {
      margin-bottom: 10px;
    }

    .popup button {
      padding: 10px 20px;
      margin: 0 10px;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>

  <script>
    function showConfirmation(voucher) {
      const popupContainer = document.querySelector('.popup-container');
      const popup = document.querySelector('.popup');

      popupContainer.style.display = 'flex';
      popup.innerHTML = `
        <p>Request from ${voucher} for 100 rs. Confirm with PIN:</p>
        <input type="password" id="pin" placeholder="Enter your PIN" required><br>
        <button onclick="submitForm('${voucher}')">Confirm</button>
        <button onclick="closePopup()">Cancel</button>
      `;
    }

    function submitForm(voucher) {
      const pinInput = document.getElementById('pin').value;
      const dealerMsisdn = voucher; // Using the voucher as dealer MSISDN

      if (pinInput === '1234') {
        closePopup();
        // Perform form submission or other actions
        alert('Form submitted!\nDealer MSISDN: ' + dealerMsisdn); // For demonstration purposes
      } else {
        alert('Invalid PIN. Please try again.');
      }
    }

    function closePopup() {
      const popupContainer = document.querySelector('.popup-container');
      popupContainer.style.display = 'none';
    }
  </script>
</head>
<body>
  <div class="header">
    Mauritius Telecom
  </div>

  <div class="container">
    <p>Choose Voucher:</p>
    <form onsubmit="return false;">
      <button type="button" onclick="showConfirmation('Voucher 1')">Voucher for rs 10 </button>
      <button type="button" onclick="showConfirmation('Voucher 2')">Voucher for rs 21 </button>
      <button type="button" onclick="showConfirmation('Voucher 3')">Voucher for rs 35 </button>
      <button type="button" onclick="showConfirmation('Voucher 4')">Voucher for rs 98 </button>
      <button type="button" onclick="showConfirmation('Voucher 5')">Voucher for rs 123</button>
    </form>
    <button class="submit-btn" onclick="submitForm('Custom Voucher')">Submit</button>
  </div>

  <!-- Custom Popup -->
  <div class="popup-container">
    <div class="popup"></div>
  </div>
</body>
</html>
